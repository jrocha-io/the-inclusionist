---
metadata:
  status: "accepted"   # corrects the first version of this ADR (v4.147.2), which was wrong — see more-information
  date: 2026-07-04
  decision-makers: [Dev, AI]
  consulted: []
  informed: []

title: Lock canvas scale to integer REAL (physical) pixels, not CSS pixels

context-and-problem-statement: |
  Reported by the Dev across several rounds: "the canvas stretches by fractional amounts / the scanlines get uneven
  spacing." The game is 320x180 logical pixel-art per screen. The question: what must the scale factor be an integer
  multiple of — CSS pixels, or the screen's physical pixels? On a display at 125% (dpr 1.25) a 3x CSS canvas is
  3.75 physical pixels per art pixel, which yields uneven pixels and scanlines.

decision-drivers:
- Art pixels must be uniform (each art pixel = an equal block of screen pixels).
- CRT scanlines must be evenly spaced at any device-pixel-ratio.
- Keep crop tolerance small (<= 5 logical px per side — Dev's requirement).

considered-options:
- &css-int "Integer multiple of CSS pixels"
- &real-int "Integer multiple of REAL (physical) pixels (dpr in the formula)"

pros-and-cons-of-the-options:
  css-int:
    description: |
      Round the CSS scale factor to an integer; keep dpr out of the formula.
    pros:
    - "The CSS scale label is a clean integer (e.g. '3x')."
    cons:
    - &css-bad "At dpr != 1 (e.g. 125%), integer-CSS is fractional in real pixels -> uneven art pixels and scanlines."
  real-int:
    description: |
      kDev = integer factor in PHYSICAL pixels:
      kDev = max(round(2*dpr), floor(min(availW*dpr/(baseW-10), availH*dpr/(baseH-10)))).
      Canvas CSS size = baseW*kDev/dpr x baseH*kDev/dpr; in REAL pixels = baseW*kDev x baseH*kDev (exact 320x180 multiple).
      k = kDev/dpr is the logical/CSS factor and MAY be fractional when dpr != 1 — that is irrelevant, it is a browser abstraction.
    pros:
    - &real-good "Each art pixel occupies an integer number of REAL pixels -> uniform art AND regular scanline spacing at any dpr."
    neutral:
    - &real-neutral "The CSS scale number can be fractional; it is noise, not the target."

decision-outcome:
  chosen-option:
    link: *real-int
    justification: |
      Only locking to integer REAL pixels guarantees both uniform art and evenly spaced scanlines. Integer-CSS does
      not: at dpr 1.25 a 3x CSS canvas is 3.75 real px/art px. The target is the physical pixel; the CSS number is noise.
      The -10 term keeps the <=5 logical-px crop tolerance.
  consequences:
    positive:
    - *real-good
    - "The DOM UI scales with the same factor (--ui-fs = 8*k, --tap = 22*k, set in layout()), so UI<->canvas ratio is constant."
    neutral:
    - *real-neutral
    negative:
    - "Where base*kDev doesn't fit exactly, crop is <=5 logical px/side by design (tolerance). Remove -10 to never crop."
  confirmation: |
    Manual: at dpr != 1, art pixels are uniform and scanlines evenly spaced. crtScanVars() period = kDev real px
    (1 line per art pixel), line = 1 real px, anchored in physical pixels. Implemented in layout() and crtScanVars()
    (currently game.js; moves into render/ modules during modularization).

more-information: |
  Lesson (the mistake not to repeat): the FIRST version of this ADR (v4.147.2) said "never put dpr in the formula;
  lock to integer CSS." That was WRONG — it came from misreading the Dev's reaction to the "4.8x" CSS label, when the
  real pixels drawn by kDev were already the integer multiple he wanted. Several rounds were spent "fixing" the wrong
  problem (blur) while the real one (uneven spacing from non-integer real-pixel scale) persisted. The target is the
  screen's REAL pixel; the CSS number is noise. Vector DOM fonts at fractional px are still crisp — the feared blur
  does not exist.
