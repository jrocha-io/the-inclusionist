metadata:
  status: "accepted"
  date: 2026-07-04
  decision-makers: [Dev, AI]
  consulted: []
  informed: []

title: Adopt TypeScript + Vite — supersedes the "no build" preference

context-and-problem-statement: |
  Was REGISTRO §5.11. The project ran as "raw ESM, no build". As it grew to 24 modules + Vitest and modularization
  started exposing type bugs, was that still right? Detail in ../plano-typescript-vite.md.

decision-drivers:
- Type safety — modularization exposes type bugs that `tsc` would catch.
- The pillars (offline PWA, lean runtime, weak hardware) must be preserved or improved.
- The "no bundler/no build" preferences were formed for a DIFFERENT goal (a single-HTML v3 game).

considered-options:
- &raw "Keep raw ESM, no build step"
- &tsvite "Migrate to TypeScript + Vite (with build)"

pros-and-cons-of-the-options:
  raw:
    cons:
    - "No type checking; @pixi/tilemap etc. ruled out for 'assuming a bundler'; manual SW + version bump."
  tsvite:
    pros:
    - &types "tsc catches type bugs across the 24 modules."
    - &lean "vite build gives bundle/minify/tree-shake (smaller payload on the Positivo) — improves pillar 1."
    - &pwa "vite-plugin-pwa generates the offline SW by content-hash — retires the hand-made sw.js + manual INCL_VERSION bump."

decision-outcome:
  chosen-option:
    link: *tsvite
    justification: |
      Migrate to TypeScript + Vite, incrementally by stages. The non-negotiable pillars are preserved/improved, not
      lost. "No build / no bundler" STOPS being a pillar/preference — its mentions across the old plans are historical.
  consequences:
    positive:
    - *types
    - *lean
    - *pwa
    neutral:
    - "Deploy on CF Pages becomes `build` → `dist/`; the Dev runs all Node commands (tsc/vitest/build)."
    negative:
    - "A migration in stages; each extraction is now born `.ts`."

more-information: |
  Was REGISTRO §5.11. Stage 0 = commit d675b9c. Supersedes the "bundler discarded" note (former §5.8). The mentions of
  "no build" in the old plano-* docs are historical, overridden by this decision + ../plano-typescript-vite.md.
