title: AI-generated content is gated by human curation — the human is accountable

context-and-problem-statement: |
  Some content (activities, art references, text) may be AI-generated. For a child-facing educational product, who is
  accountable for that content, and what is the release gate? Separately: should young students use AI tools directly?

decision-drivers:
- Child-facing content must be correct, safe, and pedagogically sound.
- Accountability cannot rest on a model — a person must own the content.
- Young learners should not be exposed to open-access AI tools.

considered-options:
- &direct "AI content ships directly"
- &gate "AI content only after human curation (human accountable)"
- &none "No AI-generated content at all"

pros-and-cons-of-the-options:
  direct:
    cons:
    - "No accountable party; risk of wrong/unsafe content reaching children."
  gate:
    pros:
    - &human "A human reviews and approves before release — and is the accountable party. The AI is never responsible."
    - &speed "Keeps the productivity of AI generation while owning the risk."
  none:
    cons:
    - "Throws away useful generation capacity for no added safety beyond the curation gate."

decision-outcome:
  chosen-option:
    link: *gate
    justification: |
      AI-generated content is released **only after human curation**; the AI is never responsible — **the human is**.
      This keeps generation productivity while placing accountability on a person.
  consequences:
    positive:
    - *human
    - *speed
    neutral:
    - "Elementary-school children never use open-access AI tools directly (school-scoped tools may come for future games)."
    negative:
    - "Every AI-produced asset needs a recorded human review step before it can reach a child."
  confirmation: |
    No AI-generated content reaches children without a recorded human review/approval; the curation policy is written
    and applied; children are not given open AI tools in the product.

more-information: |
  From the teacher consultation (2026-07-05).
