title: Art & visual-design decisions (art=data, flat colours, juice, CRT, CB-safe)

context-and-problem-statement: |
  The art/visual-design decisions. Was REGISTRO §8. Visual system in ../../game-design/Art-Bible.md; juice/feel in
  ../../game-design/Game-Feel.md.

decision-outcome:
  justification: |
    Art is data/code (procedural, GPL-clean); every juice/post-processing effect is toggleable so it can be turned off
    on weak hardware and for reduced-motion.

more-information: |
  Decisions (was REGISTRO §8):
  - **Art = procedural data/code** (PixelLab/Magnific only as design reference); pixel-art PNG now → procedural later.
    [game-design/plano-arte-procedural, research/LICENCAS-GERACAO-IMAGEM]
  - **Flat colours, no outline/shadow/light on characters** (ADHD hypothesis); 320×180 / 16px kept (48×48 cancelled —
    "too rich a resolution can be a problem for ADHD"). ⚠️ noted as a hypothesis to validate (no formal study cited).
  - **Juice** (dust/glow/squash/hit-stop/screenshake/shimmer/camera-easing) — **each toggleable in ?debug** + a
    low-performance profile that disables all. [commit 5e18fc0] Juice × reduced-motion mapped 1:1 to existing RM keys;
    hit-stop is a pause, not motion (out of RM).
  - **CRT post-processing** (scanlines/vignette/24px corners) as CSS classes on #game-region, **default OFF**; z-index
    above the game, below pause/dialogs (menus keep legibility); prefers-reduced-transparency disables it. [cf07b5a]
  - **Contrast enhancement Linear→Quadratic slider** (0=off; start=linear stretch; end=quadratic S-curve), GPU via
    feComponentTransfer sRGB, global. [PESQUISA-ALTO-CONTRASTE, commit 78995de]
  - **CB-safe palette (optional) = Okabe & Ito 2008**, applied ONLY to players/items/effects — scenery keeps natural
    colours. **Colour-blocking customizable**: 4 roles (hazard/climbable/water/gate) with a picker + restore-default.
    Items in owner colour = an OPTION (default on); off keeps owner-dimming in MP. [commit 51df79c]
  - **4 scene layers** (tileset+game / 3 parallax) — cheap depth via TilingSprite.
