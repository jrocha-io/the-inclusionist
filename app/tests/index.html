<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Inclusionist — testes de unidade</title>
<!-- Página de testes DEV-ONLY: roda os testes-folha no navegador (ambiente real: PIXI/canvas/localStorage).
     Não é linkada pelo jogo nem entra no SHELL do SW. Abra em qualquer navegador ou dirija via preview. -->
<style>
  body { font: 14px/1.5 ui-monospace, Consolas, monospace; background: #12121c; color: #e8eef0; margin: 0; padding: 20px; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #8a90a0; margin: 0 0 16px; }
  #summary { font-size: 16px; font-weight: 700; padding: 8px 12px; border-radius: 8px; display: inline-block; margin-bottom: 14px; }
  #summary.ok { background: #12341f; color: #7fe0a0; }
  #summary.bad { background: #3a1418; color: #ff8a8a; }
  .t { padding: 2px 0; border-bottom: 1px solid #1e1e2c; }
  .t.ok::before { content: '✔ '; color: #4ac07a; }
  .t.bad::before { content: '�’ '; color: #ff6a6a; }
  .t.bad { color: #ff9a9a; }
  .err { color: #ff6a6a; padding-left: 20px; }
</style>
</head>
<body>
<h1>The Inclusionist — testes de unidade</h1>
<p class="sub">Módulos-folha, no navegador (PIXI/canvas/localStorage reais). Dev-only.</p>
<div id="summary">rodando…</div>
<div id="list"></div>
<!-- PIXI é global (os testes de textura o usam), igual ao jogo. -->
<script src="../vendor/pixi.min.js"></script>
<script type="module">
  import { runAll } from './suite.js';
  const r = runAll();
  window.__testResults = r;
  const sum = document.getElementById('summary');
  sum.className = r.fail ? 'bad' : 'ok';
  sum.textContent = `${r.pass}/${r.total} passaram${r.fail ? ` — ${r.fail} FALHARAM` : ' — tudo verde'}`;
  document.getElementById('list').innerHTML = r.results.map((t) =>
    `<div class="t ${t.ok ? 'ok' : 'bad'}">${t.name}</div>` + (t.err ? `<div class="err">${t.err}</div>` : '')
  ).join('');
</script>
</body>
</html>
