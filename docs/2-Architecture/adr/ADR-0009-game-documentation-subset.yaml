title: Game-development documentation subset — which of the 24 game-dev artifacts we use

context-and-problem-statement: |
  The third catalog (after SDD in ADR-0003 and educational in ADR-0004): the 24 canonical game-development artifacts
  (GDD, beat chart, game feel, netcode, MMO persistence, LM-GM, …). Which do we adopt for an accessible educational
  2D game engine + 200+ cooperative minigames, offline, no real-time internet netcode (ADR-0008), no monetization/
  live-ops (ADR-0006)? And where do they live?

decision-drivers:
- 200+ minigames → per-game docs must be LIGHT (a heavy GDD each is impractical).
- Educational-first → the game must connect to learning; the LM-GM map is the bridge to the curriculum layer.
- No dark patterns / no monetization (ADR-0006) → reject economy/live-ops/matchmaking.
- No real-time internet netcode in MVP (ADR-0008) → defer the whole networking stack to the internet-MP tier.
- Reuse: much of this already exists as our REGISTRO decisions + visual/engine plans.

considered-options:
- &tiered "Adopt the light single-player + serious-game subset; defer networking to the internet tier; reject MMO/monetization"

pros-and-cons-of-the-options:
  tiered:
    pros:
    - "Keeps per-game docs cheap while making the learning<->mechanic link explicit (LM-GM)."
    - "Rejects the monetization/live-ops/competitive stack that conflicts with the ethics pillar."

decision-outcome:
  chosen-option:
    link: *tiered
    justification: |
      Adopt the single-player design artifacts in LIGHT, per-game form + the two serious-game artifacts; the LM-GM map
      is the key new artifact (it names where a minigame's mechanic can carry a learning mechanic — the "activity
      insertion points"). Defer the networking stack to the internet-MP tier (ADR-0008). Reject MMO, matchmaking,
      virtual economy, and live-ops as against the ethics/scope pillars.
  consequences:
    positive:
    - "A new pt-BR-agnostic `docs/game-design/` layer holds the adopted game artifacts; the blocked art/game plans migrate there."
    - "LM-GM map connects the genre catalog to the educational layer."
    neutral:
    - "Per-game docs are one-sheets, not full GDDs."
    negative:
    - "Networking artifacts stay unwritten until internet MP is studied (ADR-0008)."
  confirmation: |
    Every game-dev artifact is a live doc in game-design/, a deferred item with a trigger, or recorded rejected below.

