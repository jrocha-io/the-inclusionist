metadata:
  status: "accepted"
  date: 2026-07-05
  decision-makers: [Dev, AI]
  consulted: []
  informed: []

title: DOM educational-activities UI — light-DOM Web Components + Atomic Design; no Shadow DOM

context-and-problem-statement: |
  The out-of-engine educational activities (Duolingo-style / Playground, ex-Quizizz style) are a real, component-rich
  DOM UI — distinct from the PixiJS canvas game and its thin in-game menus. We need a component architecture for it.
  The hard constraint is accessibility (pillar #1: WCAG 2.2 + GAG): the UI must expose correct ARIA relationships to
  screen readers. What component model do we use, and do we use Shadow DOM?

decision-drivers:
- Accessibility is non-negotiable — ARIA relationships must work for screen readers, switch access, etc.
- The activities are component-rich and repeated (many small widgets) — they need a reusable, organizable model.
- Framework-agnostic and lightweight (leanest runtime pillar); must coexist with the canvas game.

considered-options:
- &light "Light-DOM Web Components (Custom Elements) + Atomic Design"
- &shadow "Web Components with Shadow DOM"
- &spa "A SPA framework (React/Vue) with its own component system"

pros-and-cons-of-the-options:
  light:
    description: |
      Custom Elements rendered into the light DOM (no shadow root), organized by Atomic Design
      (atoms -> molecules -> organisms -> templates -> pages), developed in Storybook (CSF) with Chromatic
      visual regression.
    pros:
    - &aria-ok "ARIA relationships (aria-labelledby / aria-activedescendant / aria-controls) work — they stay in one DOM tree."
    - &agnostic "Framework-agnostic, standards-based, lightweight; coexists with the canvas app."
    - &organized "Atomic Design gives a real structure for a component-rich, repetitive activity UI."
    cons:
    - &no-encap "No built-in style/DOM encapsulation — must scope CSS by convention (BEM / layers / naming)."
  shadow:
    description: |
      Custom Elements with a shadow root for style/markup encapsulation.
    pros:
    - "Style and DOM encapsulation out of the box."
    cons:
    - &aria-break "Shadow DOM BREAKS cross-boundary ARIA references (aria-labelledby/activedescendant/controls do not cross the shadow boundary) -> screen-reader footgun. Directly conflicts with pillar #1."
  spa:
    description: |
      Adopt React/Vue and use its component/state system for the activities.
    pros:
    - "Rich ecosystem, familiar DX."
    cons:
    - &heavy "Heavier runtime + build; another paradigm alongside the canvas engine; overkill and against the leanest-runtime pillar."

decision-outcome:
  chosen-option:
    link: *light
    justification: |
      Light-DOM Custom Elements keep ARIA intact (the a11y pillar wins), stay lightweight and framework-agnostic, and
      Atomic Design organizes the component-rich activity UI. The footgun is Shadow DOM specifically, not custom
      elements — so we use custom elements WITHOUT a shadow root. A full SPA framework is rejected as too heavy and a
      second paradigm next to the canvas engine.
  consequences:
    positive:
    - *aria-ok
    - *organized
    negative:
    - *no-encap   # mitigate with scoped-CSS conventions (BEM / @layer)
    neutral:
    - "Tooling: Storybook (CSF) + Chromatic for these DOM components only; the canvas game keeps the preview screenshot harness."
  confirmation: |
    Screen-reader pass on the activities: labels/relationships announced correctly; no ARIA reference silently dropped.
    No shadow root in the activity components (grep/lint). Storybook stories exist per component.

more-information: |
  Applies ONLY to the out-of-engine DOM activities. The canvas game + thin in-game menus are out of scope (no
  Storybook, no component framework). See docs/4-Sprints/README.md for the sprint-level workflow.
