<!doctype html>
<!-- SPDX-License-Identifier: GPL-3.0-or-later -->
<!--
  kokoro-webgpu-lab — mede a VELOCIDADE do Kokoro-82M via onnxruntime-web + WebGPU (fora do sherpa).
  Objetivo único desta página: descobrir o RTF do Kokoro no WebGPU. Usa kokoro-js (que já faz modelo+g2p+WebGPU) com
  voz EN só p/ medir — o idioma não muda a velocidade. Fonemização pt-BR é passo POSTERIOR. Abra e clique Carregar.
  URL: ?dtype=fp32|fp16|q8 (padrão fp32) · ?device=webgpu|wasm (padrão webgpu, cai p/ wasm se não houver GPU).
-->
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kokoro-webgpu-lab — velocidade</title>
<style>
  :root { color-scheme: dark; --bg:#14161a; --panel:#1e2128; --line:#30343d; --ink:#e8eaed; --mut:#9aa0aa; --acc:#5aa0ff; --ok:#4bd07a; --warn:#f2c200; --err:#ff6b6b; }
  * { box-sizing:border-box; } body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); padding:20px; }
  h1 { font-size:20px; margin:0 0 4px; } a { color:var(--acc); } code { background:#0d0f12; padding:1px 5px; border-radius:4px; }
  .sub { color:var(--mut); margin:0 0 14px; max-width:80ch; }
  .bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:12px 0; }
  button, select { background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:8px 14px; font-size:15px; cursor:pointer; }
  button.primary { border-color:var(--acc); background:#22304a; } button:disabled { opacity:.45; cursor:not-allowed; }
  .st { font-size:14px; min-height:1.4em; } .st.ok{color:var(--ok)} .st.warn{color:var(--warn)} .st.err{color:var(--err)}
  table { border-collapse:collapse; width:100%; margin-top:8px; } th,td { border:1px solid var(--line); padding:8px; text-align:left; }
  th { background:var(--panel); color:var(--mut); font-size:13px; } .rtf.good{color:var(--ok)} .rtf.slow{color:var(--warn)}
  #log { background:#0d0f12; border:1px solid var(--line); border-radius:8px; padding:10px; font:12px/1.5 ui-monospace,Consolas,monospace; color:var(--mut); max-height:220px; overflow:auto; white-space:pre-wrap; margin-top:8px; }
  #prog { height:3px; background:#0d0f12; border-radius:2px; overflow:hidden; margin:6px 0; } #progBar { height:100%; width:0; background:var(--acc); transition:width .1s; }
</style>
</head>
<body>
<h1>kokoro-webgpu-lab — só velocidade (RTF)</h1>
<p class="sub">
  Roda o <b>Kokoro-82M</b> via <b>onnxruntime-web + WebGPU</b> (não sherpa). Mede só o <b>RTF</b> — voz em inglês é de
  propósito (idioma não muda a velocidade; pt-BR g2p é passo posterior). Meta: <b>RTF &lt; 1</b>.
</p>
<div class="bar">
  <span id="gpu" class="st"></span>
  <button id="loadBtn" class="primary">Carregar Kokoro (WebGPU)</button>
  <span id="status" class="st warn">—</span>
</div>
<div id="prog"><div id="progBar"></div></div>
<table><thead><tr><th>Texto de teste</th><th>síntese</th><th>áudio</th><th>RTF</th></tr></thead><tbody id="rows"></tbody></table>
<h2 style="font-size:14px;color:var(--mut)">Log</h2>
<div id="log"></div>

<script type="module">
const params = new URLSearchParams(location.search);
const DTYPE = params.get('dtype') || 'fp32';
const DEVICE = params.get('device') || 'webgpu';
const logEl = document.getElementById('log'), statusEl = document.getElementById('status'), gpuEl = document.getElementById('gpu');
const progBar = document.getElementById('progBar');
const log = (m) => { logEl.textContent += m + '\n'; logEl.scrollTop = logEl.scrollHeight; };
const setStatus = (c,m) => { statusEl.className='st '+c; statusEl.textContent=m; };
window.addEventListener('error', e => log('‼ ' + (e.message||e)));
window.addEventListener('unhandledrejection', e => log('‼ ' + ((e.reason&&e.reason.message)||e.reason||e)));

gpuEl.textContent = 'navigator.gpu = ' + (navigator.gpu ? 'presente (WebGPU disponível)' : 'AUSENTE (sem WebGPU → cai p/ wasm)');
gpuEl.className = 'st ' + (navigator.gpu ? 'ok' : 'warn');
log('[cfg] dtype=' + DTYPE + ' · device=' + DEVICE + ' · navigator.gpu=' + !!navigator.gpu);

const TESTS = [
  'A.',
  'The cat.',
  'The black cat climbed onto the roof of the yellow house.',
  'a, b, c, d, e, f, g, h, i, j, k, l, m, n, o, p, q, r, s, t, u, v, w, x, y, z.',
];

let tts = null;
const loadBtn = document.getElementById('loadBtn');

function playFloat(samples, rate){ try { const AC=window.AudioContext||window.webkitAudioContext; const ac=new AC(); const b=ac.createBuffer(1,samples.length,rate); b.getChannelData(0).set(samples); const s=ac.createBufferSource(); s.buffer=b; s.connect(ac.destination); s.start(); } catch(e){ log('play: '+e.message); } }

async function speakAll(){
  const rows = document.getElementById('rows'); rows.innerHTML = '';
  for (const text of TESTS) {
    const tr = document.createElement('tr'); const short = text.length > 40 ? text.slice(0,40)+'…' : text;
    tr.innerHTML = '<td>'+short+'</td><td>…</td><td></td><td></td>'; rows.appendChild(tr);
    try {
      const t0 = performance.now();
      const audio = await tts.generate(text, { voice: 'af_heart' });
      const synthMs = performance.now() - t0;
      const samples = audio.audio || audio.data; const rate = audio.sampling_rate || audio.sampleRate || 24000;
      const dur = samples.length / rate; const rtf = (synthMs/1000)/dur;
      tr.children[1].textContent = Math.round(synthMs)+' ms';
      tr.children[2].textContent = dur.toFixed(2)+' s';
      tr.children[3].textContent = 'RTF '+rtf.toFixed(2); tr.children[3].className = 'rtf '+(rtf<1?'good':'slow');
      log('['+short+'] síntese '+Math.round(synthMs)+' ms · áudio '+dur.toFixed(2)+' s · RTF '+rtf.toFixed(2));
      playFloat(samples, rate);
      await new Promise(r => setTimeout(r, 250));
    } catch(err){ tr.children[1].textContent='erro'; log('['+short+'] ERRO: '+(err.message||err)); }
  }
  setStatus('ok','terminado — veja os RTFs.');
}

loadBtn.onclick = async () => {
  loadBtn.disabled = true; setStatus('warn','baixando kokoro-js + modelo ('+DTYPE+', ~80–330 MB no 1º uso)…');
  try {
    const mod = await import('https://esm.sh/kokoro-js@1.2.1');
    log('[kokoro-js] importado. Criando sessão (device='+DEVICE+', dtype='+DTYPE+')…');
    const t0 = performance.now();
    tts = await mod.KokoroTTS.from_pretrained('onnx-community/Kokoro-82M-v1.0-ONNX', {
      dtype: DTYPE, device: DEVICE,
      progress_callback: (p) => { if (p && p.total) { progBar.style.width = Math.round(p.loaded*100/p.total)+'%'; } },
    });
    progBar.style.width = '100%';
    log('[kokoro-js] modelo pronto em ' + Math.round(performance.now()-t0) + ' ms. Dispositivo real: veja o console (ort) — se WebGPU, o RTF cai muito.');
    setStatus('ok','modelo pronto — sintetizando os testes…');
    await speakAll();
  } catch(err){ setStatus('err', err.message||String(err)); log('‼ falha: '+(err.message||err)); loadBtn.disabled=false; }
};
log('pronto. Clique "Carregar Kokoro (WebGPU)".');
</script>
</body>
</html>
