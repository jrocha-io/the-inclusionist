title: Pedagogy & game-mode decisions (quiz levels, per-player, items, reduce-motion, physics)

context-and-problem-statement: |
  The pedagogy/game-mode decisions. Was REGISTRO §5. The detailed literacy design is in
  ../../educational/alfabetizacao.idd.md + ../../educational/Learning-Objectives.md; this ADR records the DECISIONS.

decision-outcome:
  justification: |
    The quiz follows the psychogenesis of writing (Ferreiro); multiplayer is equitable (each player their own quiz);
    items are per-owner; reduce-motion separates GAG "movement" from WCAG "animation".

more-information: |
  Decisions (was REGISTRO §5):
  - **Quiz in 5 difficulty levels** by the psychogenesis of writing (pré-silábico → silábico s/valor → silábico
    c/valor → alfabético → escritor cego): (1) choose the correctly-written word among 3, system SPELLS (Ferreiro
    distractors); (2) build by syllables, system READS the syllable; (3) build, system SPELLS the syllable's letters;
    (4) letter grid, system says the letter NAME; (5) system spells the Braille cell of each letter. Default level 2,
    persisted. Full spec → educational/alfabetizacao.idd.md. [commit 856c44b]
  - **Quiz PER PLAYER in MP**: each player opens THEIR quiz on their .player-screen; keyboard routes by owner key,
    gamepad by owner pad; others keep playing. [commit 45b5b66]
  - **Individual items per player** (owner colour, random positions, others dimmed; only the key's EFFECT is shared) —
    "stop a player from spoiling a friend's game" but "finding another's item helps them". [commit b06b8fe]
  - **Braille**: system SPELLS the CELL DOTS (pt-BR, grade 1); the ⠿ Braille left the ABC-button cycle — passive
    dictation follows Blind mode, WRITING braille is quiz level 5.
  - **Reduce-motion**: "movement" = GAG (toggle-move), "animation" = WCAG 2.3.3 — separate toggles per animation type
    and per player; breathing ≠ frills.
  - **Physics**: velocities independent of each other (none derived from another); live TUNE in ?debug.
  - **Math games** = syllable-game format: equation on top + 3×3 answer grid; graphics REPLACE numbers (per item), not
    added; fraction graphic = the activity's DIVISION unreduced, sliced with black borders. Fractions: sum/sub,
    simplified (gcd), spoken in full; 5 toggleable notations (MathML native preferred, ~0KB; KaTeX/MathLive deferred).
