version: 2
updates:
  # App dependencies (PixiJS, Vite, Vitest, release-it…)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # one PR for the low-risk dev tooling bumps
      dev-tooling:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    labels:
      - "infra"
      - "chore"

  # GitHub Actions used by our workflows (ci.yml, codeql.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "infra"
      - "chore"
