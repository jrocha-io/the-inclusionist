# a11y gate (#10) — axe-core contra a app RODANDO (build → preview → scripts/axe-check.mjs). Falha em qualquer
# violação WCAG A/AA no nosso app (widget VLibras excluído). Ver docs/6-DevOps-SRE/CI-QA.md.
name: a11y (axe)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Build (dist/)
        run: npm run build

      - name: Preview + axe-core
        run: |
          npm run preview -- --port 4173 &
          for i in $(seq 1 30); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 1; done
          AXE_URL=http://localhost:4173/ node scripts/axe-check.mjs
