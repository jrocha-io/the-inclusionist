title: Multiplayer scaling — 4 per screen, a whole classroom over a LAN server, internet MP only after study

context-and-problem-statement: |
  How many players, and over what topology? A classroom has many gov computers; each computer seats up to 4 children.
  We want the class to play together without exposing children over the internet before we can secure it. This
  supersedes the open player-count question flagged in ADR-0006.

decision-drivers:
- Cooperative classroom use (ADR-0006): the class plays together, not against each other.
- Child safety: no exposing children over the internet until it is well understood and securable.
- Government hardware: up to 4 children per computer; many computers per classroom.
- Privacy pillars: no accounts; a school-local server keeps data on the school network (see compliance-legal / RN-04).

considered-options:
- &two "1–2 players only (the earlier draft)"
- &tiered "4 per screen → a whole classroom over a school LAN server → internet MP only after study"

pros-and-cons-of-the-options:
  two:
    cons:
    - "Undercounts the classroom reality (4 fit per computer) and the goal of the whole class playing together."
  tiered:
    pros:
    - &screen "Up to 4 players on the SAME screen (independent viewports, one shared sim — pillar 7)."
    - &lan "A whole classroom joins over a school-LOCAL server: N computers x 4 = up to 4N students in one session, data on the school network."
    - &safe "Internet multiplayer is deferred until it is very well studied and we have the security to implement it."

decision-outcome:
  chosen-option:
    link: *tiered
    justification: |
      Matches the classroom (4 per machine, many machines) and keeps children off the open internet until we can
      secure it. Same-screen 4-player is the MVP capability (pillar 7); the classroom LAN server is the next step
      (pillar 9); internet MP is a studied, secured future.
  consequences:
    positive:
    - *screen
    - *lan
    - *safe
    neutral:
    - "The LAN server is school-local (data residency — RN-04); the internet tier will need its own security study + ADR."
    negative:
    - "The LAN-server tier adds a sync layer beyond the same-screen MVP (deferred, reuses the P7/P9 model)."
  confirmation: |
    MVP: 4 independent viewports on one screen over one shared sim; no netcode. LAN tier: classroom clients sync to a
    school-local server, no child data leaving the school network. Internet tier: blocked until a security study + ADR.

more-information: |
  From the Dev (2026-07-05). Supersedes the player-count question in ADR-0006. Refines pillar 7 (separate-screen MP)
  and pillar 9 (LAN + store-and-forward). The internet-MP security study is
  `../../research/internet-multiplayer-security.md` (#29) — its core rule: children never contact strangers online;
  any internet MP is adult-mediated, closed, no open chat. It must become a STRIDE pass + an ADR before implementation.
