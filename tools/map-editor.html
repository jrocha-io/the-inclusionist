<!DOCTYPE html>
<!-- SPDX-License-Identifier: GPL-3.0-or-later -->
<!-- The Inclusionist — editor de mapa (texto-glifo). Ferramenta de DEV (não vai para o deploy).
     Reusa o legend/parser de app/js/core/tiles.js e as cores de app/js/core/constants.js (uma verdade só).
     Precisa ser servido por HTTP a partir da RAIZ do repo (ES modules não carregam via file://):
       python -m http.server 8191 --directory SP-the-inclusionist-tracer
     e abrir  http://localhost:8191/tools/map-editor.html -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Editor de mapa · The Inclusionist</title>
<style>
  :root{ --bg:#0b1020; --panel:#161c2e; --ink:#eef1f7; --mut:#9aa3b8; --line:#2a3350; --accent:#ffd23f; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font:14px/1.4 system-ui,Segoe UI,Roboto,sans-serif; }
  header{ padding:.6rem 1rem; border-bottom:1px solid var(--line); display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
  h1{ font-size:1rem; margin:0; }
  .grow{ flex:1; }
  button, label.btn{ background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:6px;
    padding:.4rem .7rem; cursor:pointer; font:inherit; }
  button:hover, label.btn:hover{ border-color:var(--accent); }
  main{ display:grid; grid-template-columns:220px 1fr 320px; gap:0; height:calc(100vh - 52px); }
  aside{ padding:.6rem; overflow:auto; border-right:1px solid var(--line); }
  aside.right{ border-right:0; border-left:1px solid var(--line); }
  .pal{ display:flex; flex-direction:column; gap:.25rem; }
  .sw{ display:flex; align-items:center; gap:.5rem; padding:.25rem .4rem; border:1px solid transparent; border-radius:6px; cursor:pointer; }
  .sw:hover{ background:#0f1424; }
  .sw.on{ border-color:var(--accent); background:#0f1424; }
  .chip{ width:22px; height:22px; border-radius:4px; border:1px solid #0006; display:grid; place-items:center;
    font-weight:700; font-size:12px; image-rendering:pixelated; flex:0 0 auto; }
  .sw .g{ color:var(--mut); width:1.2em; text-align:center; }
  .sw .n{ flex:1; }
  #stage{ overflow:auto; display:grid; place-items:center; background:#05070e; }
  canvas{ image-rendering:pixelated; background:#000; box-shadow:0 0 0 1px var(--line); cursor:crosshair; }
  aside.right{ display:flex; flex-direction:column; gap:.6rem; }
  textarea{ width:100%; flex:1; min-height:160px; background:#05070e; color:#cfe; border:1px solid var(--line);
    border-radius:6px; font:12px/1.15 ui-monospace,Consolas,monospace; white-space:pre; overflow:auto; resize:vertical; }
  .rep{ font-size:12px; color:var(--mut); }
  .rep b{ color:var(--ink); }
  .warn{ color:#ff8f6b; }
  .ok{ color:#7fe0a0; }
  .hint{ color:var(--mut); font-size:12px; }
  kbd{ background:#0f1424; border:1px solid var(--line); border-radius:4px; padding:0 .3em; }
</style>
</head>
<body>
<header>
  <h1>🗺️ Editor de mapa</h1>
  <span id="dims" class="hint"></span>
  <span class="grow"></span>
  <button id="btn-load">↻ Recarregar clarity</button>
  <label class="btn">📂 Abrir .txt<input id="file" type="file" accept=".txt,.map.txt" hidden></label>
  <button id="btn-save">💾 Salvar .map.txt</button>
</header>
<main>
  <aside>
    <div class="hint" style="margin-bottom:.4rem">Pincel — clique/arraste no mapa. <br>Ativo: <b id="active">pedra</b></div>
    <div id="pal" class="pal" role="listbox" aria-label="Tipos de tile"></div>
  </aside>
  <div id="stage"><canvas id="cv" width="100" height="100" aria-label="Grade do mapa"></canvas></div>
  <aside class="right">
    <div class="hint">Espelho ascii (o que vai para o arquivo):</div>
    <textarea id="mirror" readonly spellcheck="false" aria-label="Texto-glifo do mapa"></textarea>
    <div>
      <div class="hint" style="margin-bottom:.3rem">Validação:</div>
      <div id="report" class="rep"></div>
    </div>
    <div class="hint">Zoom: <kbd>-</kbd>/<kbd>+</kbd> · O editor normaliza para retangular preenchendo à direita
      com <code>:</code> (ar escuro) — idêntico no jogo.</div>
  </aside>
</main>

<script type="module">
import { TYPE_GLYPH, GLYPH_TYPE, TILE_NAME, parseLevel, gridToGlyphs } from '../app/js/core/tiles.js';
import { TILE_COLOR } from '../app/js/core/constants.js';

const DEFAULT_URL = '../app/assets/levels/clarity.map.txt';
const TYPES = Object.keys(TILE_NAME).map(Number);           // 0..14
const $ = (s) => document.querySelector(s);

let grid = [];            // grid[y][x] = tipo
let header = [];          // linhas "#!" preservadas
let active = 2;           // pedra
let cell = 14;            // px por tile
let painting = false;

// ---- carregar / normalizar ----
function normalize(rows) {
  const W = Math.max(...rows.map(r => r.length));
  return rows.map(r => { const out = r.slice(); while (out.length < W) out.push(0); return out; }); // pad com 0 (ar escuro)
}
async function loadFromText(text) {
  header = text.split(/\r?\n/).filter(l => l.startsWith('#!'));
  grid = normalize(parseLevel(text));
  redraw(); mirror(); validate(); dims();
}
async function loadDefault() {
  try { const t = await (await fetch(DEFAULT_URL + '?b=' + Date.now())).text(); await loadFromText(t); }
  catch (e) { $('#report').innerHTML = '<span class="warn">Não consegui carregar o clarity.map.txt. Sirva a RAIZ do repo por HTTP (ver comentário no topo do arquivo).</span>'; }
}

// ---- render ----
const cv = $('#cv'), ctx = cv.getContext('2d');
function redraw() {
  const H = grid.length, W = H ? grid[0].length : 0;
  cv.width = W * cell; cv.height = H * cell;
  ctx.imageSmoothingEnabled = false;
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const t = grid[y][x];
    ctx.fillStyle = TILE_COLOR[t] || '#000';
    ctx.fillRect(x * cell, y * cell, cell, cell);
    if (cell >= 10) { // glifo por cima (leve)
      ctx.fillStyle = 'rgba(255,255,255,.35)';
      ctx.font = (cell - 3) + 'px ui-monospace,Consolas,monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(TYPE_GLYPH[t], x * cell + cell / 2, y * cell + cell / 2 + 1);
    }
  }
}
function cellAt(ev) {
  const r = cv.getBoundingClientRect();
  const x = Math.floor((ev.clientX - r.left) / cell), y = Math.floor((ev.clientY - r.top) / cell);
  return (y >= 0 && y < grid.length && x >= 0 && x < grid[0].length) ? { x, y } : null;
}
function paint(ev) {
  const c = cellAt(ev); if (!c) return;
  if (grid[c.y][c.x] === active) return;
  grid[c.y][c.x] = active;
  ctx.fillStyle = TILE_COLOR[active] || '#000';
  ctx.fillRect(c.x * cell, c.y * cell, cell, cell);
  if (cell >= 10) { ctx.fillStyle = 'rgba(255,255,255,.35)'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = (cell - 3) + 'px ui-monospace,Consolas,monospace'; ctx.fillText(TYPE_GLYPH[active], c.x*cell+cell/2, c.y*cell+cell/2+1); }
}
cv.addEventListener('mousedown', (e) => { painting = true; paint(e); });
cv.addEventListener('mousemove', (e) => { if (painting) paint(e); });
window.addEventListener('mouseup', () => { if (painting) { painting = false; mirror(); validate(); } });

// ---- paleta ----
function buildPalette() {
  const pal = $('#pal'); pal.innerHTML = '';
  for (const t of TYPES) {
    const el = document.createElement('div'); el.className = 'sw' + (t === active ? ' on' : '');
    el.setAttribute('role', 'option'); el.tabIndex = 0;
    el.innerHTML = `<span class="chip" style="background:${TILE_COLOR[t]}">${TYPE_GLYPH[t]}</span>`
      + `<span class="g">${TYPE_GLYPH[t]}</span><span class="n">${TILE_NAME[t]}</span>`;
    const pick = () => { active = t; $('#active').textContent = TILE_NAME[t]; [...pal.children].forEach(c=>c.classList.remove('on')); el.classList.add('on'); };
    el.addEventListener('click', pick);
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); pick(); } });
    pal.appendChild(el);
  }
}

// ---- espelho + validação ----
function mirror() { $('#mirror').value = gridToGlyphs(grid); }
function dims() { $('#dims').textContent = grid.length ? `${grid[0].length}×${grid.length} tiles` : ''; }
function validate() {
  const count = {}; for (const row of grid) for (const t of row) count[t] = (count[t] || 0) + 1;
  const gate = count[10] || 0, key = count[11] || 0;
  const present = TYPES.filter(t => count[t]).map(t => `${TYPE_GLYPH[t]} ${TILE_NAME[t]}: <b>${count[t]}</b>`);
  const msgs = [];
  if (gate > 0 && key === 0) msgs.push('<span class="warn">⚠ Há portão (|) mas nenhuma chave (*).</span>');
  if (gate === 0 && key > 0) msgs.push('<span class="warn">⚠ Há chave (*) mas nenhum portão (|).</span>');
  if (!msgs.length) msgs.push('<span class="ok">✓ Sem problemas óbvios.</span>');
  $('#report').innerHTML = msgs.join('<br>') + '<hr style="border-color:var(--line);margin:.5rem 0">' + present.join('<br>');
}

// ---- salvar ----
function save() {
  const body = gridToGlyphs(grid);
  const txt = (header.length ? header.join('\n') + '\n' : '') + body + '\n';
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'clarity.map.txt';
  a.click(); URL.revokeObjectURL(a.href);
}

// ---- eventos ----
$('#btn-load').addEventListener('click', loadDefault);
$('#btn-save').addEventListener('click', save);
$('#file').addEventListener('change', async (e) => { const f = e.target.files[0]; if (f) await loadFromText(await f.text()); });
window.addEventListener('keydown', (e) => {
  if (e.key === '+' || e.key === '=') { cell = Math.min(28, cell + 2); redraw(); }
  if (e.key === '-') { cell = Math.max(6, cell - 2); redraw(); }
});

// expõe para teste no Preview
window.__editor = { get grid(){return grid;}, get header(){return header;}, setActive:(t)=>{active=t;}, paintCell:(x,y,t)=>{grid[y][x]=t;redraw();mirror();validate();}, save };

buildPalette();
loadDefault();
</script>
</body>
</html>
