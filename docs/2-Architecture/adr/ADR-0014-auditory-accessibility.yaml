title: Auditory accessibility decisions (mixer, blind mode, TTS)

context-and-problem-statement: |
  The audio-accessibility decisions. Was REGISTRO §4 (+ §4.1 neural TTS). Design detail in
  ../../1-Discovery/plano-audio-fase-f.md and ../../1-Discovery/plano-tts-fase-f5.md.

decision-outcome:
  justification: |
    Independent volume categories + audio-only navigation aids (never darkening the screen) are the core auditory-a11y
    decisions (GAG). TTS is neural-first, offline-capable, with Web Speech as the fallback.

more-information: |
  Decisions (was REGISTRO §4 / §4.1):
  - **9-category mixer** (music, ambient, interaction, earcons, other, TTS, sonar, edge-guard, guide) — the
    sound-navigation volume is NOT affected by the master volume (GAG: independent controls). [plano-audio-fase-f]
  - **Blind mode = audio aids** (cane with per-surface material, sonar, edge-guard, looping guide, ropes in water)
    WITHOUT darkening the screen; blind-EMPATHY = black screen. ("Don't confuse blind mode with empathy mode.")
  - **Sound by per-player audio output** (setSinkId); volume/TTS/blind-mode only editable by whoever has a PRIVATE
    output (can't play with different players' canes on the same speaker).
  - **TTS: Piper primary pt-BR** + Kokoro + Kitten + eSpeak NG WASM embedded; Web Speech = fallback; TTS and Captions
    toggles separate. [plano-tts-fase-f5 — full neural build is issue-tracked] Piper faber-medium via
    @mintplex-labs/piper-tts-web 1.0.4: lazy-CDN, OPFS caches the 60.3MB onnx (2nd session offline), 1-utterance queue,
    auto Web-Speech fallback. [commit 814fb5d — measured: 1st use 9.2s, synthesis > real-time, 2nd session 1.3s]
  - **Hearing-loss empathy**: downward expansion + low-pass — the INVERSE of a hearing aid (threshold → ×0.1; highs first).
  - **Music: MIDI or procedural, no ogg/mp3** (target-hardware weight + GPL-clean); chiptune study is issue-tracked.
  - **GAG pause** silences ALL sound and freezes rain/animations (WCAG 2.2.2).
