title: Compliance & data-governance decisions (local-law-wins, RN-01..04, identity-via-gov)

context-and-problem-statement: |
  The compliance/data-governance decisions. Was REGISTRO §7. The legal ANALYSIS (regimes, ABNT, funding) is in
  ../../research/compliance-legal.md; the pillar-level summary is in ADR-0010; this ADR is the decision record.

decision-outcome:
  justification: |
    Compliance is per-region: the local law of the deployment region wins (the old "strictest wins" was
    self-contradictory, e.g. China real-name vs COPPA minimization). Child data is minimized to nothing that leaves
    the device by default.

more-information: |
  Decisions (was REGISTRO §7):
  - **Local law of the deployment region WINS**; the rest are "goals, as feasible". [ADR-0010]
  - **RN-02 — adult identity never stored in the game**: the ADULT (teacher/guardian) registers via the government
    system (.gov in BR; RNV only inside China); we keep at most a consent token/boolean, not the identity. Doesn't
    contradict LGPD/COPPA (verifiable guardian consent is exactly what's required; child PII minimized).
  - **RN-03 — real-name only inside China**; minor anti-addiction (China) is OUT of the MVP.
  - **RN-04 — data residency**: a country's player telemetry stays on that country's servers, unless the origin permits
    storing elsewhere (permission of origin AND destination).
  - **RN-01 — no open child data**: research data is anonymous-only via a vetted-institution partnership (IRB/ethics),
    never child PII; raw data stays local/in-region (premortem: open child data = brand-killing scandal risk).
    [research/AVALIACAO-ADVERSARIAL-PREMORTEM]
  - **China "approvable" is an engineering GOAL, not a sales claim** (版号/localization are external approval);
    communicate "approvable" only with a real local partnership.
  - ⚠️ **ESTUDO PENDENTE**: Finnish/Nordic + Chinese educational policies; item-by-item GAG map; criterion-by-criterion
    WCAG 2.2 map (AA vs AAA, honest) — the final audit is issue #19.
