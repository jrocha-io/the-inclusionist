metadata:
  status: "accepted"
  date: 2026-07-05
  decision-makers: [Dev, AI]
  consulted: [teacher consultation]
  informed: []

title: Access & discovery — no login, teacher-generated activity code, icon-based non-text navigation

context-and-problem-statement: |
  The product has no accounts and stores no child PII (privacy pillars). How does a child — often a pre-reader, on a
  government tablet/Chromebook, with no login — reach the *right* activity? Teachers prepare the lesson beforehand and
  decide what to work on. Professionals (psychopedagogue, neuropsych, speech/occupational therapist) also need to find
  activities by pedagogical criteria.

decision-drivers:
- No login / no PII (privacy + LGPD/COPPA pillars) — nothing to authenticate.
- Pre-readers + EN 301 549 / EAA — navigation must not depend on text.
- Teacher-directed: the adult prepares the lesson; the child just plays.
- Government hardware reached via a shortcut; must be dead-simple in class.

considered-options:
- &accounts "Accounts + child profiles"
- &code "Teacher-generated activity CODE + filter discovery (no login)"
- &browse "Open free-browse only"

pros-and-cons-of-the-options:
  accounts:
    cons:
    - "Requires child PII + auth — violates the privacy pillars; a burden on gov tablets shared in class."
  code:
    description: |
      The teacher builds a lesson at home via FILTERS (BNCC discipline/year/field, Bloom taxonomy, cognitive skill),
      which yields a short CODE. In class the child opens the site via a shortcut and TYPES the code to reach the exact
      same screen; children with difficulty get a more accessible input. Professionals also discover by the same filters.
    pros:
    - &nopii "No login, no PII, no cookies/behavioural tracking without explicit consent."
    - &directed "Teacher-directed and deterministic — the code is a deep-link to a specific activity."
    - &prof "The same filter taxonomy serves professionals (Bloom/cognitive-skill search)."
  browse:
    cons:
    - "No way for the teacher to target a specific skill for the class; loses lesson intent."

decision-outcome:
  chosen-option:
    link: *code
    justification: |
      The activity code keeps the no-login/no-PII stance while letting the teacher target a precise skill. Discovery is
      by filter (BNCC/Bloom/cognitive), and **navigation is icon-based / non-text** for pre-readers (e.g. the filter's
      four digits are shown as four animals in primary/secondary colours) — satisfying EN 301 549 / EAA.
  consequences:
    positive:
    - *nopii
    - *directed
    - *prof
    negative:
    - "Needs a stable code scheme (filters → code → deterministic screen) and an icon vocabulary for the filters."
  confirmation: |
    No authentication anywhere in the flow; a given code always loads the same activity; a pre-reader can select
    filters and enter the code via icons/colours without reading text.

more-information: |
  From the teacher consultation (2026-07-05). Data persistence (progress on the SCHOOL server, with parental approval,
  responsibility shifting to the school/network) is a **v2.0** concern — see research/compliance-legal.md.
