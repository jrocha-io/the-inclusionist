metadata:
  status: "accepted"
  date: 2026-07-07
  decision-makers: [Dev, AI]
  consulted: []
  informed: []

title: Research labs (TTS lab et al.) are first-class TS/Vite/DI/tested apps, not throwaway spikes

context-and-problem-statement: |
  The TTS lab (`docs/research/sherpa-lab.html`) grew into a single ~460-line monolith: HTML + CSS + inline vanilla
  JS, no TypeScript, no build, no dependency injection, no ports/adapters, no tests — the opposite of the product
  standard (ADR-0019: TS + Vite; the modularization discipline in docs/5-Refactoring/plano-modularizacao.md). That was
  defensible while `docs/research/` was, per ARCHITECTURE.md, "studies that back decisions" — a throwaway spike whose
  only durable output is the DECISION, with the winning code later graduating into `app/js/**` under full discipline.
  But the Dev states these labs are a PERMANENT, publicly-accessible surface ("uma página à parte do produto principal,
  mas acessível via internet") and MORE labs will follow. A permanent, published, multi-engine surface that violates
  every engineering rule of the project it showcases is untenable: it rots, it can't be tested, and its engine code
  can't be trusted to graduate cleanly. Question raised by the Dev: should the lab follow TS + modularization + DI +
  decoupling like the rest of the project? Decision needed on the labs' engineering status.

decision-drivers:
- Permanence + public exposure: the labs are a lasting, internet-accessible surface, not a scratch file — so they
  inherit the project's durability, a11y and maintainability bar, not the spike exemption.
- Showcase integrity: a public artifact OF this project must EXEMPLIFY its standards (TS/Vite/DI/tested), not contradict
  them.
- Graduation de-risking: if the lab's engines are already `TtsEngine` ports + adapters (sherpa / Web Speech / eSpeak /
  Kokoro-WebGPU), the winning one moves into the game's `tts.ts` as a proven, tested unit instead of a rewrite.
- Anti-over-engineering tension (Dev, repeatedly): DI/DAO/adapters on a benchmark harness risked being ceremony. The
  Dev weighed this and chose full standard anyway — recorded here so the choice is not silently re-litigated.
- Research-first + small rounds: the project migrates in tested increments (arXiv:2409.15152 discipline), so this is a
  STAGED refactor, never a big-bang rewrite; the working monolith stays until the last stage.

considered-options:
- &spike "Keep labs as throwaway spikes in docs/research (vanilla monolith); only the winning engine graduates to app/"
- &light "Promote to TS + a few ES modules + build, but NO DI/DAO/adapters (it is a benchmark, not an engine)"
- &full "Promote labs to first-class TS + Vite + DI + ports/adapters + Vitest, same discipline as app/js/"

pros-and-cons-of-the-options:
  spike:
    pros:
    - "Zero ceremony; fastest path to the real goal (pick a fast, good TTS)."
    - "Correct IF labs are disposable — which the Dev has now overruled."
    cons:
    - "A permanent, public artifact that violates the project's own constitution; unmaintainable and untestable as it grows."
  light:
    pros:
    - "Maintainable + typed without full ritual; reasonable middle ground for a benchmark."
    cons:
    - "Engines stay coupled → they don't graduate cleanly; partial standard invites drift and 'why here but not there' debt."
  full:
    pros:
    - &graduate "Engines become TtsEngine ports + adapters → the winner graduates into game tts.ts as a tested unit."
    - &exemplar "The public lab exemplifies the project's engineering instead of contradicting it."
    - &testable "Pure logic (catalogs, RTF/gain math, cache-repo parse, url→engine mapping) gets Vitest node coverage; infra (player/logger/fetcher) gets browser coverage."
    cons:
    - &cost "Real refactor cost + more build/test surface for a non-product artifact; must be staged to avoid breaking the working monolith."

decision-outcome:
  chosen-option:
    link: *full
    justification: |
      Adopt **full standard** for the research labs. The TTS lab (and future labs) become first-class apps: **TypeScript**,
      built by **Vite**, structured with **dependency injection** (constructor injection at a composition root — no
      framework) and **ports/adapters** decoupling, and covered by **Vitest** (node for pure logic, browser for infra).
      Core shape:
        · Port `TtsEngine` (load / listVoices / speak→metrics) with adapters `WebSpeechEngine`, `MeSpeakEngine`
          (eSpeak NG), `SherpaEngine` (wraps the sherpa-onnx-wasm FS loader + multi-thread), `KokoroWebGpuEngine`.
        · Injected infra ports: `AudioPlayer` (WebAudio), `Logger` (DOM), `ModelFetcher`/DAO (HF/R2 fetch + Cache API +
          progress) — all mockable, so section wiring is testable with a `FakeTtsEngine`.
        · UI as thin view-controllers over a shared task-table component; engines reached ONLY through the port.
      **Staged migration** (each stage committable + Dev-buildable, monolith kept working until the last):
        0 scaffold the lab as a Vite entry → 1 extract pure domain (catalogs/RTF/gain/parse) + node tests → 2 infra
        ports/adapters + browser tests → 3 fallback engines (Web Speech + eSpeak) wired via DI → 4 SherpaEngine →
        5 KokoroWebGpuEngine → 6 retire `docs/research/sherpa-lab.html`, move sherpa-wasm assets, wire PWA/COOP-COEP.
      **The exact home + Vite topology** (multi-page input under `app/labs/` vs a separate package) is settled in the
      migration plan, NOT here — this ADR fixes only the ENGINEERING STATUS (full standard), which is topology-agnostic.
  consequences:
    positive:
    - *graduate
    - *exemplar
    - *testable
    neutral:
    - "docs/research/ keeps the STUDY docs (tts-*.md); the lab CODE moves under the product tree. ARCHITECTURE.md updates to reflect the new home once topology is confirmed."
    - "Neural synthesis itself is too heavy/nondeterministic for CI — tests cover pure logic + the port contract via a fake engine, not real WASM/WebGPU output."
    negative:
    - *cost
    - "Multi-engine COOP/COEP (for sherpa multi-thread) must be scoped so it does not affect the game deploy."
  confirmation: |
    `npm run build` emits the lab as a routed page; `npx vitest run` passes the lab's node + browser tests; the three
    sections behave as the retired monolith did; and the winning engine adapter is later reused (not rewritten) inside
    the game's tts.ts. NOT done until José's passing test at each stage.

more-information: |
  Extends ADR-0019 (TypeScript + Vite) to cover research labs. Relates to ADR-0022 (sherpa-onnx-wasm runtime — the
  engine the `SherpaEngine` adapter wraps) and ADR-0002 (light-DOM Web Components / Atomic Design — the UI component
  style the lab's view layer should follow). Migration plan (the staged, tested rounds + the home/topology decision):
  docs/5-Refactoring/plano-tts-lab-modularizacao.md (to be written once topology is confirmed with the Dev). The Dev
  explicitly chose "full standard" over "throwaway spike" and "TS-light" — the anti-over-engineering objection was
  considered and overruled for this artifact because it is permanent and public.
