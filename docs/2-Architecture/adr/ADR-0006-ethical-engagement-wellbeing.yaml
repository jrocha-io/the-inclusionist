metadata:
  status: "accepted"
  date: 2026-07-05
  decision-makers: [Dev, AI]
  consulted: []
  informed: []

title: Ethical engagement, wellbeing & play-based pedagogy — no dark patterns, cooperative, session limits

context-and-problem-statement: |
  How do we drive engagement in a children's product without the manipulation and harm the industry normalizes
  (Duolingo-style streak pressure, dopamine-spike feedback, loot boxes)? The product is free, for young children, on
  school hardware, and must be safe for autistic children and compliant with wellbeing regulation.

decision-drivers:
- Child wellbeing over engagement metrics; no monetization to optimize.
- Autism: calm, clean design — no color/sound explosions.
- Anti-fatigue / anti-addiction regulation (China "Youth Mode").
- Pedagogy: Finland's play-based (free-play) learning.

considered-options:
- &engage "Engagement-optimized (streaks, dopamine feedback, loot, competition)"
- &ethical "Wellbeing-first (no dark patterns, cooperative, play-based, session limits, calm design)"

pros-and-cons-of-the-options:
  engage:
    cons:
    - "Dark patterns / dopamine loops harm children; competition + loot conflict with the mission and monetization ban."
  ethical:
    pros:
    - &nodark "No loot boxes, no streak/elixir pressure, no dopamine-spike sounds, no ads, no microtransactions."
    - &play "Finland play-based (free-play) learning as the pedagogical model."
    - &coop "Always COOPERATIVE (1–2 players, no competition) — refines the multiplayer pillar."
    - &calm "Clean, calm design (no color/sound explosions) — autism-safe; reduced-motion/quiet by default."
    - &wellbeing "40-minute session wellbeing lock (China Youth Mode) against visual/mental fatigue."

decision-outcome:
  chosen-option:
    link: *ethical
    justification: |
      We reject the standard engagement toolkit. Engagement comes from good play, not manipulation. This is both an
      ethics stance and a compliance one (Youth Mode session limit; EAA/autism calm design).
  consequences:
    positive:
    - *nodark
    - *play
    - *coop
    - *calm
    - *wellbeing
    neutral:
    - "When a child is stuck ~3 minutes, show non-anxious hints (arrows to the goal, which buttons, a demo animation)."
    negative:
    - "Foregoes the retention gains of dark patterns — accepted by design."
  confirmation: |
    No loot/streak/ad/dopamine-spike mechanics present (audit); session lock triggers at 40 min; reduced-motion and
    quiet are defaults; multiplayer is cooperative-only.

more-information: |
  From the Dev's product vision (drafted as messages to a teacher), 2026-07-05. Refines **pillar 7 (multiplayer)** to
  cooperative-only; the player-count/scaling decision is in **ADR-0008**. The "no Duolingo" instinct was already in
  REGISTRO §5.10; this ADR makes it a first-class decision.
