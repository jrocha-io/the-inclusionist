# CI — testes + build check. SÓ verifica (NÃO deploya; o deploy é o Cloudflare Pages nativo, git-connected).
# Roda em todo push na main E em Pull Requests → sinal verde/vermelho no commit/PR. Não precisa de secrets.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'   # Node 24.14.0 — mesma versão do dev local e do build do CF
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Supply-chain — npm audit (deps de produção, que vão pro navegador)
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck

      - name: Chromium (Playwright, p/ os testes de render)
        run: npx playwright install --with-deps chromium

      - name: Testes (Vitest — node + browser)
        run: npm test

      - name: Build não pode quebrar (vite build → dist/)
        run: npm run build
