---
metadata:
  status: "accepted"
  date: 2026-07-06
  decision-makers: [Dev, AI]
  consulted: []
  informed: []

title: Adopt sherpa-onnx-wasm as the neural TTS runtime (supersedes the lib choice in ADR-0021)

context-and-problem-statement: |
  ADR-0021 shipped neural pt-BR TTS via @mintplex-labs/piper-tts-web. Playtests + code reading exposed hard limits:
  (1) the lib is **discontinued/unstable** (Dev); (2) its `PATH_MAP` is fixed and `HF_BASE` (rhasspy/piper-voices) is
  hardcoded, so it can load ONLY `pt_BR-edresson-low` (unusable) and `pt_BR-faber-medium` — no high-quality community
  voices, no self-host; (3) `TtsSession` is a global singleton that never reloads the model on a voice change.
  Meanwhile the browser lab confirmed **Kokoro-js and KittenTTS are English-only** → useless for pt-BR. We need a
  runtime that runs ANY VITS/Piper `.onnx` in the browser, from any (CORS-enabled) host, fully offline after first fetch.

decision-drivers:
- Voice freedom: run high-quality pt-BR voices (miro-high) + faber/jeff-medium, not just what one lib's map allows.
- Host freedom: load models from any CORS URL — decouples us from a lib's hardcoded host.
- Offline (pillar): WASM + model cached (OPFS/Cache API) → offline after the first fetch; schools have no IT/LAN.
- Stability/maintenance: sherpa-onnx (k2-fsa) is actively maintained across 12 languages/platforms; Mintplex is not.
- **Tiered quality by hardware** (Dev): the baseline must run on the weakest school machine in use, BUT better hardware
  must be allowed to opt into better voices (e.g. Kokoro multi-lang, a ~340 MB model) — progressive enhancement, not
  lowest-common-denominator-only.
- Research-first: validated model availability + the lib API before deciding.

considered-options:
- &mintplex "Stay on @mintplex-labs/piper-tts-web"
- &sherpa "sherpa-onnx compiled to WebAssembly (k2-fsa) as the runtime"
- &kokoro "Kokoro-js"

pros-and-cons-of-the-options:
  mintplex:
    cons:
    - "Discontinued/unstable; 2 pt-BR voices only; hardcoded rhasspy host; singleton can't switch voice."
  sherpa:
    pros:
    - &any "Runs ANY VITS/Piper .onnx in-browser; models loaded from any CORS URL at runtime via the Emscripten FS (fetch → Uint8Array → FS.writeFile → OfflineTts)."
    - &offline "WASM + model cacheable → fully offline after first fetch."
    - &maint "Actively maintained (k2-fsa); huge model catalog (tts-models release), incl. pt_BR miro-high/faber/jeff/cadu."
    cons:
    - &build "Needs an Emscripten/asset build step (Dev runs Node) and ships the espeak-ng-data + WASM (~a few MB) alongside the model."
  kokoro:
    cons:
    - "kokoro-js@1.2.1 is English-only in the browser (pt-BR exists only in the Python lib via misaki g2p)."

decision-outcome:
  chosen-option:
    link: *sherpa
    justification: |
      Adopt **sherpa-onnx-wasm** as the neural TTS runtime and drop @mintplex-labs (and Kokoro-js/Kitten for pt-BR).
      **Approach B (universal loader):** build the sherpa-wasm engine WITHOUT a baked model; at runtime fetch each
      voice's files → `FS.writeFile` → init `OfflineTts`. Voices are then a config/JSON table — adding one is a data
      change, not a code change. **Tiered by hardware:**
        · baseline pt-BR VITS/Piper from k2-fsa `tts-models`: **miro-high** (high) + **faber-medium** + **jeff-medium**
          (all real pt-BR; `dii` is pt-PT, there is no pt-BR `dora-high`); and
        · a HIGH-END option for better machines: **Kokoro multi-lang** via sherpa (`kokoro-multi-lang-v1_0.onnx` ~340 MB
          + `voices.bin` + `tokens.txt` + `dataDir`; pt-BR voices `pb_dora`/`pb_alex`).
      **Default = lazy-fetch** (nothing bundled): use **eSpeak** (and Web Speech) to talk WHILE the neural model
      downloads, then decide per device whether Piper/Kokoro actually runs. **eSpeak stays** the engine for the raw
      **phoneme / spell-letter / spell-syllable** drills (sherpa takes text, not phonemes); neural does **words +
      sentences**. **Web Speech + eSpeak are kept as fallbacks** even if rarely hit (browser-inconsistent / dated, but
      zero-download).
      **Hosting = Cloudflare R2** (REVERSES ADR-0021's 'no R2'): HuggingFace does not have the bandwidth to serve raw
      un-tarred model files; R2 (CORS `*`) hosts the `.onnx`/`tokens.txt`/`voices.bin`/`espeak-ng-data`. Weights still
      fetch once and then run 100% locally, cached (OPFS/Cache API), disclosed to schools.
  consequences:
    positive:
    - *any
    - *offline
    - *maint
    neutral:
    - "The CDN-only lab can't run sherpa (needs a build) → it is KEPT for eSpeak + Web Speech comparison; the neural A-B (miro/faber/jeff/Kokoro) happens in-game or in a Dev-built harness."
    - "sherpa = words+sentences (and letters/syllables via Piper, which reads letters well). The PHONEME layer is UNDER REVIEW: playtest rejected eSpeak as too robotic (unusable for speech therapists / literacy teachers), so 'eSpeak = phonemes' from the earlier plan is NOT settled — open research on how to voice true isolated phonemes naturally. Web Speech + eSpeak stay as last-resort fallbacks only."
    negative:
    - *build
    - "Larger first-load footprint (WASM engine + espeak-ng-data + model) — mitigated by caching + a small default voice."
  confirmation: |
    A working in-game prototype speaking pt-BR with miro-high (and switchable to faber/jeff) from a runtime-loaded model,
    offline on the 2nd load. Then tts.ts routes phoneme/letter/syllable → eSpeak, words/sentences → sherpa.

more-information: |
  Supersedes the LIB half of ADR-0021 (npm @mintplex-labs). The 'no R2, weights from HF' half is **REVERSED**: models now
  live on **Cloudflare R2** (HF lacks raw-file bandwidth); the 'fetch once → 100% local → disclose to schools' principle
  is retained. Dev decisions locked this round: **Approach B** (universal loader); **R2** hosting; **lazy-fetch** default
  (eSpeak/Web Speech cover the download gap); **keep** eSpeak + Web Speech as fallbacks; **tiered by hardware** (baseline
  VITS/Piper for weak machines, Kokoro multi-lang opt-in for better ones). Still open: how the WASM + espeak-ng-data ship
  in Vite/`dist` and are cached for PWA/offline. **NOT YET VALIDATED by a passing user test** — even eSpeak is still
  unconfirmed in the browser lab; nothing here is "done" until José tests it. Plan: docs/research/tts-sherpa-onnx-plan.md.
  VITS/Piper models: k2-fsa/sherpa-onnx releases (tag tts-models). Kokoro multi-lang: kokoro-multi-lang-v1_0.onnx (~340 MB)
  + voices.bin + tokens.txt + dataDir (sherpa config `kokoro:{model,voices,tokens,dataDir}`, voice `pb_dora`/`pb_alex`).
  Why ONNX and not NCNN (sherpa-ncnn also does vits-piper TTS + WASM): docs/research/tts-ncnn-vs-onnx.md — ONNX wins on
  voice-ecosystem breadth + fidelity + WASM maturity for a browser; NCNN's edge (tiny ARM binary) isn't our bottleneck.
