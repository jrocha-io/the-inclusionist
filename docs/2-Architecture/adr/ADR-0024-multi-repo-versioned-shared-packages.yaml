---
metadata:
  status: "accepted"
  date: 2026-07-07
  decision-makers: [Dev, AI]
  consulted: []
  informed: []

title: Multi-repo + versioned shared packages — TTS-Lab as its own repo/domain; commons published via semver

context-and-problem-statement: |
  ADR-0023 made the research labs first-class apps and explicitly DEFERRED the home + build topology to this decision.
  The Dev then locked the topology: TTS-Lab becomes its OWN git repository (a submodule of The-Inclusionist), deployed
  to its OWN Cloudflare domain (a `labs` subdomain of the project site); code shared between The-Inclusionist, TTS-Lab
  and FUTURE projects is distributed as **versioned packages** (semver, registry-published) — chosen over a workspace
  monorepo and over a submodule-graph of shared libs; **no runtime CDN** (deps are npm, bundled by Vite); and the
  cross-origin isolation headers (COOP/COEP) the sherpa multi-thread build needs must be scoped to the lab, never the
  game. This ADR fixes the repository + packaging + deploy shape that this implies.

decision-drivers:
- Reuse across many projects (Dev's platform goal): "o objetivo da modularização é criar bibliotecas em comum" for
  present + future projects → real package boundaries with semver, not copy-paste or path hacks.
- Deploy isolation: the lab's heavy deps and its COOP/COEP headers must not touch the game's build or deploy.
- Supply-chain + offline + a11y determinism: no runtime CDN imports — every dependency is an npm package Vite bundles,
  so builds are reproducible and the offline pillar holds.
- Reproducible superproject: The-Inclusionist pins TTS-Lab at a known commit (submodule SHA) for reproducible builds.
- Registry with least new infra: the org already lives on GitHub → GitHub Packages (npm) needs no extra service.

considered-options:
- &workspace "Monorepo with workspaces (one repo, packages/*, path deps)"
- &submodules "Multi-repo with a submodule-graph of shared libs (commons as a nested submodule in each consumer)"
- &versioned "Multi-repo with versioned packages: commons published to a registry, consumers depend by semver"

pros-and-cons-of-the-options:
  workspace:
    pros:
    - "Lowest-friction shared code (path deps, no publish); easiest day-to-day."
    cons:
    - "One repo → weaker isolation; not the separate-repo/-deploy the Dev wants for the lab."
  submodules:
    pros:
    - "Literal separate repos; strong source isolation."
    cons:
    - "Pinned-SHA update dance; nested commons submodule = continuous friction — the OPPOSITE of the easy-shared-libs goal."
  versioned:
    pros:
    - &reuse "Real package boundaries + semver → clean reuse across this + future projects."
    - &iso "Full deploy/repo isolation; the lab's COOP/COEP + heavy deps never reach the game."
    - &graduate "The @scope/tts package (port + adapters) is consumed by BOTH the lab and the game's tts.ts — the winner graduates by dependency, not rewrite."
    cons:
    - &overhead "Publish + version-bump step on every commons change; more repos for the Dev to run."

decision-outcome:
  chosen-option:
    link: *versioned
    justification: |
      Adopt a **multi-repo, versioned-package** layout.
      REPOS:
        · `the-inclusionist` — the game (this repo; unchanged root `app/` → `dist/`).
        · `tts-lab` — the lab; its OWN repo, added to `the-inclusionist` as a **git submodule** (e.g. `labs/tts-lab/`)
          for a pinned reference; deploys independently to a **`labs.` Cloudflare domain**.
        · `inclusionist-commons` — the shared packages, published to **GitHub Packages** under scope **`@jrocha-io`**.
      COMMONS PACKAGES (start SMALL; split further only when a 2nd consumer proves the need — YAGNI):
        · `@jrocha-io/tts` — the `TtsEngine` port + shared types + engine adapters (Web Speech, eSpeak/meSpeak, sherpa,
          Kokoro-WebGPU) + a small registry/factory. Consumed by the lab AND (later) the game's `tts.ts`.
        · `@jrocha-io/audio` — `AudioPlayer` port + WebAudio impl.
        · `@jrocha-io/logging` — `Logger` port + DOM/console impls.
        · `@jrocha-io/model-fetch` — `ModelFetcher` DAO (fetch + Cache API + progress).
        (`ui-kit` deferred until a real 2nd consumer needs it.)
      CONSUMPTION: consumers depend by semver (`^`). The Dev bumps + publishes commons on change (Changesets or
      release-it per package). NO runtime CDN: `kokoro-js` and the eSpeak-NG WASM become npm deps (vendored into
      `@jrocha-io/tts` if no clean npm build exists); Vite bundles them.
      HEADERS: COOP/COEP live ONLY on the lab deploy (Cloudflare `_headers` on the `labs.` domain) — never on the game.
      This ADR fixes the SHAPE; the staged migration (rounds, tests, expected outputs) is in
      docs/5-Refactoring/plano-tts-lab-modularizacao.md.
  consequences:
    positive:
    - *reuse
    - *iso
    - *graduate
    neutral:
    - "Submodule pin: updating the lab means bumping the submodule SHA in the superproject (Dev runs it)."
    - "Registry auth: publishing/installing @jrocha-io/* needs a GitHub Packages token; under Avast use NODE_OPTIONS=--use-system-ca + UV_NATIVE_TLS=1; never the wrangler OAuth for CF (token/dashboard only)."
    negative:
    - *overhead
    - "Three+ repos to stand up before the lab can build against published commons — front-loaded setup (Dev-run: git/registry/CF)."
  confirmation: |
    `@jrocha-io/tts` (+ audio/logging/model-fetch) published and installable from GitHub Packages; the `tts-lab` repo
    builds against them and deploys to `labs.<domain>`; the game build/deploy is unchanged (no COOP/COEP, no lab code);
    and `@jrocha-io/tts` is later a dependency of the game's `tts.ts`. NOT done until José's passing test each stage.

more-information: |
  Resolves the topology left open by ADR-0023. Registry = GitHub Packages (scope `@jrocha-io`, matching the repo owner).
  Versioning via Changesets (preferred for multi-package) or release-it per package. The Dev runs ALL git/registry/CF
  operations (repo creation, submodule wiring, publish, domain setup) — the AI designs, scaffolds files, and guides.
  Avast/TLS: NODE_OPTIONS=--use-system-ca, UV_NATIVE_TLS=1 for npm install/publish. Cloudflare: never wrangler OAuth
  (Avast blocks it) — use CLOUDFLARE_API_TOKEN or the dashboard. Relates to ADR-0022 (sherpa runtime wrapped by the
  sherpa adapter) and ADR-0019 (TS + Vite). Plan: docs/5-Refactoring/plano-tts-lab-modularizacao.md.
